<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Simulator - CodeWave Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 16px;
        }

        p {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            margin-bottom: 40px;
        }

        .start-btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 16px 48px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .footer {
            margin-top: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>Android Simulator</h1>
        <p>Веб-симулятор мобильной ОС</p>
        
        <a href="simulator.html" class="start-btn">🚀 Запустить симулятор</a>
        
        <div class="footer">
            by CodeWave Pro
        </div>
    </div>
</body>
</html>
