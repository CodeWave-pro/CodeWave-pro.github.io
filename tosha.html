<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тоша</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: red;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1>Тоша</h1>
    <p>Тоша — это кот</p>
    <button class="btn">Больше</button>
</body>
</html>
